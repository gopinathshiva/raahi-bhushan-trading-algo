<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Sensibull Position Tracker</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: radial-gradient(circle at top, #eef2ff 0%, #f8fafc 42%, #f1f5f9 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }

        .login-container {
            background: #fff;
            border-radius: 12px;
            border: 1px solid #e2e8f0;
            box-shadow: 0 20px 48px rgba(15, 23, 42, 0.12);
            padding: 30px;
            width: 100%;
            max-width: 420px;
        }

        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .login-header h1 {
            color: #0f172a;
            font-size: 26px;
            margin-bottom: 8px;
            letter-spacing: -0.02em;
        }

        .login-header p {
            color: #64748b;
            font-size: 14px;
        }

        .mode-toggle {
            display: flex;
            background: #f8fafc;
            border-radius: 10px;
            border: 1px solid #e2e8f0;
            padding: 3px;
            margin-bottom: 24px;
        }

        .mode-toggle button {
            flex: 1;
            padding: 10px;
            border: none;
            background: transparent;
            color: #64748b;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            border-radius: 8px;
            transition: all 160ms ease;
        }

        .mode-toggle button.active {
            background: white;
            color: #4338ca;
            box-shadow: 0 1px 2px rgba(15,23,42,0.08);
        }

        .form-group {
            margin-bottom: 24px;
        }

        .form-group label {
            display: block;
            color: #334155;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 14px;
        }

        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #cbd5e1;
            border-radius: 10px;
            font-size: 15px;
            transition: all 160ms ease;
            outline: none;
        }

        .form-group input:focus {
            border-color: #818cf8;
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.15);
        }

        .remember-me {
            display: flex;
            align-items: center;
            margin-bottom: 24px;
        }

        .remember-me input[type="checkbox"] {
            width: 18px;
            height: 18px;
            margin-right: 8px;
            cursor: pointer;
        }

        .remember-me label {
            color: #64748b;
            font-size: 14px;
            cursor: pointer;
            user-select: none;
        }

        .btn-login {
            width: 100%;
            padding: 14px;
            background: #4f46e5;
            color: #fff;
            border: 1px solid #4338ca;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 130ms ease, box-shadow 130ms ease, background-color 130ms ease;
        }

        .btn-login:hover {
            transform: translateY(-1px);
            background: #4338ca;
            box-shadow: 0 8px 18px rgba(79, 70, 229, 0.24);
        }

        .btn-login:active {
            transform: translateY(0);
        }

        .alert {
            padding: 12px 16px;
            border-radius: 10px;
            margin-bottom: 24px;
            font-size: 14px;
            border: 1px solid transparent;
        }

        .alert-error {
            background: #fee2e2;
            color: #991b1b;
            border-color: #fecaca;
        }

        .alert-info {
            background: #eef2ff;
            color: #3730a3;
            border-color: #c7d2fe;
        }

        .alert-success {
            background: #dcfce7;
            color: #166534;
            border-color: #86efac;
        }

        .login-footer {
            text-align: center;
            margin-top: 24px;
            padding-top: 24px;
            border-top: 1px solid #e2e8f0;
            color: #64748b;
            font-size: 13px;
        }

        .lock-icon {
            width: 60px;
            height: 60px;
            background: #eef2ff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            font-size: 28px;
        }

        .form-container {
            display: none;
        }

        .form-container.active {
            display: block;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <div class="lock-icon">🔒</div>
            <h1 id="header-title">Admin Login</h1>
            <p>Sensibull Position Tracker</p>
        </div>

        <!-- Mode Toggle -->
        <div class="mode-toggle">
            <button type="button" id="btn-login-mode" class="active" onclick="switchMode('login')">Login</button>
            <button type="button" id="btn-register-mode" onclick="switchMode('register')">Register Admin</button>
        </div>

        {% if error %}
        <div class="alert alert-error">
            {{ error }}
        </div>
        {% endif %}

        {% if info %}
        <div class="alert alert-info">
            {{ info }}
        </div>
        {% endif %}

        {% if success %}
        <div class="alert alert-success">
            {{ success }}
        </div>
        {% endif %}

        <!-- Login Form -->
        <div id="login-form" class="form-container active">
            <form method="POST" action="{{ url_for('login') }}">
                <input type="hidden" name="action" value="login">
                <div class="form-group">
                    <label for="login-username">Username</label>
                    <input type="text" id="login-username" name="username" required autofocus 
                           placeholder="Enter your username" value="{{ request.form.username if request.form.action == 'login' else '' }}">
                </div>

                <div class="form-group">
                    <label for="login-password">Password</label>
                    <input type="password" id="login-password" name="password" required 
                           placeholder="Enter your password">
                </div>

                <div class="remember-me">
                    <input type="checkbox" id="remember" name="remember" value="yes">
                    <label for="remember">Remember me for 30 days</label>
                </div>

                <button type="submit" class="btn-login">Sign In</button>
            </form>
        </div>

        <!-- Register Form -->
        <div id="register-form" class="form-container">
            <form method="POST" action="{{ url_for('login') }}">
                <input type="hidden" name="action" value="register">
                <div class="form-group">
                    <label for="register-username">Username</label>
                    <input type="text" id="register-username" name="username" required 
                           placeholder="Choose a username" value="{{ request.form.username if request.form.action == 'register' else '' }}">
                </div>

                <div class="form-group">
                    <label for="register-password">Password</label>
                    <input type="password" id="register-password" name="password" required 
                           placeholder="Choose a password (min 6 characters)">
                </div>

                <div class="form-group">
                    <label for="verification-code">Verification Code</label>
                    <input type="text" id="verification-code" name="verification_code" required 
                           placeholder="Enter verification code" value="{{ request.form.verification_code if request.form.action == 'register' else '' }}">
                </div>

                <button type="submit" class="btn-login">Register Admin</button>
            </form>
        </div>

        <div class="login-footer">
            <p>🔐 Secure admin access only</p>
        </div>
    </div>

    <script>
        function switchMode(mode) {
            const loginBtn = document.getElementById('btn-login-mode');
            const registerBtn = document.getElementById('btn-register-mode');
            const loginForm = document.getElementById('login-form');
            const registerForm = document.getElementById('register-form');
            const headerTitle = document.getElementById('header-title');

            if (mode === 'login') {
                loginBtn.classList.add('active');
                registerBtn.classList.remove('active');
                loginForm.classList.add('active');
                registerForm.classList.remove('active');
                headerTitle.textContent = 'Admin Login';
            } else {
                loginBtn.classList.remove('active');
                registerBtn.classList.add('active');
                loginForm.classList.remove('active');
                registerForm.classList.add('active');
                headerTitle.textContent = 'Register Admin';
            }
        }

        // Auto-switch to register mode if there was a registration error
        {% if request.form.action == 'register' %}
        window.addEventListener('DOMContentLoaded', function() {
            switchMode('register');
        });
        {% endif %}
    </script>
</body>
</html>
